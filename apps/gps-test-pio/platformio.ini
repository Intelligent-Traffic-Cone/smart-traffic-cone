[env:esp32-s3-devkitc-1]
platform = espressif32@6.10.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.flash_mode = dio
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L

build_flags =
    -D GPS_UART_NUM=1
    -D GPS_TX_PIN=17
    -D GPS_RX_PIN=18
    -D GPS_BAUD=115200
